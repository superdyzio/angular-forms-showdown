<div class="slideshow-container">
  <!-- Header with navigation and progress -->
  <header class="slideshow-header">
    <div class="header-content">
      <a routerLink="/" class="back-button">{{ 'common.backToMain' | translate }}</a>
      <h1>{{ 'slideshow.title' | translate }}</h1>
      <div class="slide-counter">
        {{ currentSlide() }} / {{ totalSlides() }}
      </div>
    </div>
    
    <!-- Progress bar -->
    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="progressPercentage()"></div>
      </div>
    </div>
  </header>

  <!-- Slide content -->
  <main class="slide-content">
    <div class="slide-wrapper">
      <div class="slide">
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>

  <!-- Navigation controls -->
  <footer class="slideshow-footer">
    <button 
      class="nav-button prev" 
      (click)="previousSlide()" 
      [disabled]="currentSlide() === 1">
      {{ 'slideshow.previous' | translate }}
    </button>
    
    <div class="slide-indicators">
      @for (item of visibleIndicators(); track item.id) {
        @if (item.kind === 'slide') {
          <button
            class="indicator"
            [class.active]="currentSlide() === item.n"
            (click)="goToSlide(item.n)">
            {{ item.n }}
          </button>
        } @else {
          <span class="indicator-ellipsis" aria-hidden="true">…</span>
        }
      }
    </div>
    
    <button 
      class="nav-button next" 
      (click)="nextSlide()" 
      [disabled]="currentSlide() === totalSlides()">
      {{ 'slideshow.next' | translate }}
    </button>
  </footer>
</div>
